name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) — no API tokens stored.
# Triggered when a GitHub Release is published. Bump __version__ in
# src/sidstation/__init__.py, then cut a Release (e.g. tag v0.1.0).
#
# One-time PyPI setup (pypi.org -> Publishing -> add a pending publisher):
#   PyPI project: pysidstation   Owner: anarkiwi   Repo: pysidstation
#   Workflow: publish.yml        Environment: pypi

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pysidstation
    permissions:
      id-token: write # mint the OIDC token PyPI verifies for Trusted Publishing
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
