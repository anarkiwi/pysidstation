name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # The preset bank is downloaded from Elektron on demand by the tests;
      # cache it so we are kind to their servers and resilient to blips.
      - name: Cache the Elektron preset fixture
        uses: actions/cache@v4
        with:
          path: tests/data
          key: sidstation-presets-${{ hashFiles('tests/conftest.py') }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -ra

  render:
    name: Render smoke test (reSIDfp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install with the render extra (pyresidfp)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,render]"
      - name: Run renderer tests
        run: python -m pytest tests/test_render.py -ra

  lint:
    name: Lint and format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install -e ".[lint]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  build:
    name: Build and check distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
      - name: Verify metadata with twine
        run: python -m twine check dist/*
      - name: Smoke-test the built wheel
        run: |
          python -m pip install dist/*.whl
          python -c "import sidstation; print('sidstation', sidstation.__version__)"
          sidstation --version
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
