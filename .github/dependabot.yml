# Dependabot keeps GitHub Actions and Python dependencies up to date.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2

updates:
  # GitHub Actions used by the CI workflow (actions/checkout, setup-python, ...).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"

  # Python build/test dependencies declared in pyproject.toml
  # (hatchling, pytest, ...).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
